<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
</head>
<body style="font-family: Arial; padding: 20px;">
    <h1>Admin Portal</h1>
    <hr/>
    <div>
        <h2>Manage Doctors</h2>
        <input type="text" id="searchDoc" placeholder="Search Doctor Name" />
        <button onclick="alert('Feature implemented in js')">Search</button>
        <button onclick="alert('Open Add Doctor Modal')">Add New Doctor</button>
    </div>
    <div style="margin-top:20px;">
        <h3>Doctor List</h3>
        <table border="1" style="width:100%; text-align:left;">
            <tr>
                <th>Name</th>
                <th>Specialty</th>
                <th>Actions</th>
            </tr>
            <tr>
                <td>Dr. Alice</td>
                <td>Cardiology</td>
                <td><button>Delete</button></td>
            </tr>
        </table>
    </div>
    <script src="/js/adminDashboard.js"></script>
</body>
</html>
