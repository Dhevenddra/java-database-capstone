<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); }
        .modal-content { background-color: #fefefe; margin: 15% auto; padding: 20px; border: 1px solid #888; width: 300px; border-radius: 8px; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .close:hover { color: black; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
        button { padding: 8px 12px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Admin Portal</h1>
    <hr/>
    <div>
        <h2>Manage Doctors</h2>
        <input type="text" id="searchDoc" placeholder="Search Doctor Name" style="width: auto; display: inline-block;" />
        <button onclick="alert('Feature implemented in js')">Search</button>
        <button onclick="document.getElementById('addDocModal').style.display='block'">Add New Doctor</button>
    </div>

    <!-- The Modal -->
    <div id="addDocModal" class="modal">
      <div class="modal-content">
        <span class="close" onclick="document.getElementById('addDocModal').style.display='none'">&times;</span>
        <h3>Add Doctor</h3>
        <input type="text" id="docName" placeholder="Name (e.g. Dr. Smith)" />
        <input type="text" id="docSpecialty" placeholder="Specialty" />
        <input type="email" id="docEmail" placeholder="Email" />
        <input type="text" id="docPhone" placeholder="Phone" />
        <input type="password" id="docPass" placeholder="Password" />
        <button onclick="saveDoctor()" style="width:100%; background:#0056b3; color:white; border:none; margin-top:10px;">Save Doctor</button>
      </div>
    </div>

    <div style="margin-top:20px;">
        <h3>Doctor List</h3>
        <table border="1" style="width:100%; text-align:left;" id="docTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Specialty</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="docTableBody">
                <!-- Data loaded via JS -->
            </tbody>
        </table>
    </div>

    <script>
        function loadDoctors() {
            fetch('/api/doctors')
                .then(res => res.json())
                .then(data => {
                    const tbody = document.getElementById('docTableBody');
                    tbody.innerHTML = '';
                    data.forEach(doc => {
                        tbody.innerHTML += `<tr>
                            <td>${doc.name}</td>
                            <td>${doc.specialty}</td>
                            <td>${doc.email}</td>
                            <td><button>Delete</button></td>
                        </tr>`;
                    });
                });
        }

        function saveDoctor() {
            const data = {
                name: document.getElementById('docName').value,
                specialty: document.getElementById('docSpecialty').value,
                email: document.getElementById('docEmail').value,
                phone: document.getElementById('docPhone').value,
                password: document.getElementById('docPass').value
            };
            fetch('/api/doctors', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(doc => {
                document.getElementById('addDocModal').style.display = 'none';
                loadDoctors(); // reload table
            });
        }

        // initial load
        loadDoctors();
    </script>
</body>
</html>
