<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - SmartCare System</title>
    <style>
        body { font-family: Arial; padding: 50px; text-align: center; background: #f4f4f9; }
        .login-box { background: white; padding: 20px; border-radius: 8px; width: 300px; margin: auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, button { display: block; width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #0056b3; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>SmartCare Login</h2>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username" required />
            <input type="password" name="password" placeholder="Password" required />
            <select name="role" style="width: 100%; padding: 10px; margin-bottom: 15px;">
                <option value="admin">Admin</option>
                <option value="doctor">Doctor</option>
                <option value="patient">Patient</option>
            </select>
            <button type="button" onclick="fakeLogin()">Login</button>
        </form>
    </div>
    <script>
        function fakeLogin() {
            const role = document.querySelector('select[name="role"]').value;
            // Fake token generation based on selection to route to correct dashboard
            window.location.href = "/" + role + "Dashboard/" + role + "-token-123";
        }
    </script>
</body>
</html>
